<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Маскароны Санкт-Петербурга</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #f3efe8;
        --card-bg: #fffdfa;
        --border-color: #d9cfbe;
        --text-main: #2a2a2a;
        --text-muted: #6f675a;
        --accent: #5a4c3b;
    }

    body {
        margin: 0;
        display: flex; 
        flex-direction: row;
        align-items: flex-start; 
        background: var(--bg-color);
        color: var(--text-main);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
    }

    
    .sidebar {
        width: 280px;
        flex-shrink: 0; 
        background: #ede6da;
        border-right: 1px solid var(--border-color);
        padding: 30px 20px;
        height: 100vh;
        position: sticky;
        top: 0;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .back-link {
        display: inline-block;
        margin-bottom: 30px;
        color: var(--accent);
        text-decoration: none;
        font-size: 14px;
        border-bottom: 1px dotted var(--accent);
        font-weight: 600;
        cursor: pointer;
    }
    
    .back-link:hover { border-bottom-style: solid; }

    .sidebar h2 {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        margin-bottom: 30px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 10px;
        margin-top: 0;
    }

    .nav-item { margin-bottom: 10px; }

    .nav-label {
        font-weight: 600;
        cursor: pointer;
        padding: 8px 12px;
        display: block;
        background: #e3ddd2;
        border-radius: 4px;
        transition: 0.3s;
        user-select: none;
    }

    .nav-label:hover { background: #dcd4c5; }
    
    .submenu {
        display: none; 
        list-style: none;
        padding-left: 20px;
        margin-top: 5px;
    }

    .submenu li {
        padding: 6px 0;
        font-size: 14px;
        color: var(--text-muted);
        cursor: pointer;
    }

    .submenu li:hover {
        color: var(--accent);
        text-decoration: underline;
    }

    .active .submenu { display: block; }

    
    .main-content {
        flex: 1; 
        padding: 40px;
        box-sizing: border-box;
    }

    h1 {
        text-align: center;
        font-family: "Playfair Display", serif;
        letter-spacing: 2px;
        margin-bottom: 10px;
        margin-top: 0;
    }

    .subtitle {
        text-align: center;
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 50px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
    }

    .exhibit {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 18px;
        transition: transform 0.3s ease;
        border-radius: 4px;
        cursor: pointer;
    }

    .exhibit:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .photo {
        width: 100%;
        height: 200px;
        background: #e3ddd2;
        border: 1px dashed #bfb6a6;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin-bottom: 14px;
    }

    .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .label {
        font-family: "Playfair Display", serif;
        font-size: 18px;
        margin-bottom: 4px;
    }

    .category {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #7a7265;
        margin-bottom: 10px;
    }

    .meta { font-size: 14px; line-height: 1.5; }

    
    .modal {
        display: none; 
        position: fixed; 
        z-index: 1000; 
        left: 0; top: 0;
        width: 100%; height: 100%; 
        background-color: rgba(0,0,0,0.8);
        backdrop-filter: blur(4px);
    }

    .modal-content {
        background-color: var(--card-bg);
        margin: 50px auto; 
        padding: 40px;
        border-radius: 8px;
        width: 70%;
        max-width: 800px;
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
    }

    .close {
        position: absolute;
        right: 20px; top: 10px;
        font-size: 30px;
        cursor: pointer;
        color: var(--text-muted);
    }

    .modal-table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
    }

    .modal-table td {
        padding: 12px;
        border-bottom: 1px solid var(--border-color);
        font-size: 15px;
    }

    .modal-table b { color: var(--accent); }
    
    .modal-desc { line-height: 1.6; font-size: 15px; margin-top: 20px; }
    .modal-author { font-size: 13px; color: var(--text-muted); margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 10px; }
</style>
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="back-link">← Назад к главной</a>
    <h2>Навигация</h2>
    <div class="nav-item" id="maskaron-section">
        <span class="nav-label" onclick="toggleMenu('maskaron-section')">▼ Маскароны</span>
        <ul class="submenu">
            <li onclick="filterDistricts('all')">Все районы</li>
            <li onclick="filterDistricts('central')">Центральный район</li>
        </ul>
    </div>
</div>

<div class="main-content">
    <h1>Маскароны Санкт-Петербурга</h1>
    <div class="subtitle">Цифровая музейная картотека архитектурных маскаронов XIX–XX вв.</div>

    <div class="gallery" id="gallery">
        <div class="exhibit" data-district="central" onclick="openBadayevModal()">
            <div class="photo">
                <img src="Жуковского 53.JPG" alt="Барельеф Аврора">
            </div>
            <div class="label">Барельеф «Аврора»</div>
            <div class="category">Мифология / Центральный </div>
            <div class="meta">
                <b>Адрес:</b> Жуковского ул., 53 <br>
                <b>Архитекторы:</b> В. А. Косяков и др. <br>
                <b>Год:</b> 1904–1906 
            </div>
        </div>
    </div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    function toggleMenu(id) {
        document.getElementById(id).classList.toggle('active');
    }

    function filterDistricts(district) {
        const items = document.querySelectorAll('.exhibit');
        items.forEach(item => {
            item.style.display = (district === 'all' || item.dataset.district === district) ? 'block' : 'none';
        });
    }

    function openBadayevModal() {
        const content = `
            <h2 style="font-family: 'Playfair Display', serif;">Дом П. Т. Бадаева </h2>
            <table class="modal-table">
                <tr><td><b>Элемент:</b></td><td>Барельеф </td></tr>
                <tr><td><b>Местоположение:</b></td><td>щипцовый объем на углу здания, центральная часть, последний этаж </td></tr>
                <tr><td><b>Владелец:</b></td><td>П. Т. Бадаев </td></tr>
                <tr><td><b>Год постройки:</b></td><td>1904-1906 </td></tr>
                <tr><td><b>Архитекторы:</b></td><td>С. Ф. Кириллов, В. А. Косяков, Г. А. Косяков, Н. Л. Подбереский </td></tr>
            </table>
            <div class="modal-desc">
                <p><b>Описание:</b> Образ крылатой Авроры, богини утренней зари, дополнен длинной косой на русский мотив. Над головой – солнечный круг и зодиакальный круг как символ непрерывного продолжения жизни. </p>
                <p>Этот сюжет был заимствован архитекторами с летней виллы папы Пия IV в Ватикане.</p>
                <p><i>Историческая справка:</i> Существует предположение, что часть декоративного убранства была утрачена в 1941 году из-за взрыва фугасной авиабомбы. </p>
            </div>
            <div class="modal-author">Фотография сделана автором проекта: Дарьей Александровной </div>
        `;
        document.getElementById('modalBody').innerHTML = content;
        document.getElementById('infoModal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('infoModal').style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('infoModal')) closeModal();
    }
</script>

</body>
</html>
